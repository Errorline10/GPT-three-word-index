name: Deploy open-source developer promotion site

on:
  push:
    branches: [main]
    paths:
      - "openSource-Dev-Promotion/**"
      - ".github/workflows/open-source-dev-promotion-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: openSource-Dev-Promotion

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
